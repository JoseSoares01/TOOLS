<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador QR · Despesas (BCP)</title>
    <link rel="icon" type="image/x-icon" href="/images/despesas.png">

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

    <!-- Mesmo layout/efeitos do Trivalor -->
    <link rel="stylesheet" href="/css/Trivalor.css">
    <link rel="stylesheet" href="/css/SidebarMenu.css">

    <script>
        const usuarioLogado = localStorage.getItem('usuarioLogado');
        if (!usuarioLogado) {
            alert('Você precisa fazer login para acessar esta página.');
            window.location.href = '/login.html';
        }
    </script>
</head>

<body>
    <img src="/images/home-button.png" width="40" class="home-button" onclick="location.href = '/pages/Tools.html';">

    <div class="container tech-bg">
        <div class="child1 glass-panel">
            <form id="qr-form">
                <div class="hero-header">
                    <p class="main-title">GERADOR DE CÓDIGO QR</p>
                    <h2 class="brand-title">DESPESAS (BCP)</h2>
                </div>

                <div class="dashboard-grid">
                    <!-- CARD PRINCIPAL ESQUERDO -->
                    <div class="main-card card-left">
                        <h3 class="card-title">Dados do Documento</h3>

                        <input type="text" id="nif_vendedor" placeholder="NIF do fornecedor (números)">
                        <input type="text" id="nif_empresa" placeholder="NIF da empresa (números)">

                        <select id="tipologia">
                            <option value="">Tipologia (FT,NC,OR,RV)</option>
                            <option value="FT">FT</option>
                            <option value="NC">NC</option>
                            <option value="OR">OR</option>
                            <option value="RV">RV</option>
                        </select>

                        <input type="text" id="numero_fatura" placeholder="Número da fatura">

                        <select id="espaco_fiscal">
                            <option value="">Escolha o Espaço Fiscal</option>
                            <option value="PT">PT (Portugal)</option>
                            <option value="PT-AC">PT-AC (Açores)</option>
                            <option value="PT-MA">PT-MA (Madeira)</option>
                        </select>

                        <button type="button" class="btn-generate card-button" onclick="generateQRCode()">
                            <strong>GERAR QR</strong>
                            <ion-icon name="qr-code-outline" class="btn-icon"></ion-icon>
                        </button>
                    </div>

                    <!-- CARD PRINCIPAL DIREITO -->
                    <div class="main-card card-right">
                        <h3 class="card-title">Dados Fiscais</h3>

                        <select id="pais">
                            <option value="">Escolha o País</option>
                            <option value="PT">PT (Portugal)</option>
                            <option value="EU">EU (União Europeia)</option>
                            <option value="INT">INT (Internacional)</option>
                        </select>

                        <div class="date-input-container">
                            <input type="text" id="data" placeholder="Data (AAAAMMDD)" readonly>
                            <input type="date" id="data_calendario" onchange="formatarData()">
                            <ion-icon name="calendar-outline" class="calendar-icon"></ion-icon>
                        </div>

                        <input type="number" step="0.01" id="base_isenta" placeholder="Base isenta">
                        <input type="number" step="0.01" id="base_reduzida" placeholder="Base reduzida">
                        <input type="number" step="0.01" id="base_intermedia" placeholder="Base intermédia">
                        <input type="number" step="0.01" id="base_normal" placeholder="Base normal">
                        <input type="number" step="0.01" id="irs" placeholder="IRS">
                    </div>

                    <!-- CARD DO QR CODE -->
                    <div class="qr-card">
                        <h3 class="card-title">Pré-visualização</h3>
                        <div class="qr-output">
                            <div class="qr-inner-box">
                                <div class="qr-code" id="qrcode"></div>
                            </div>
                            <textarea id="qr_data" readonly></textarea>
                            <button type="button" class="copy" data-copy="#qr_data">
                                <strong>Copy</strong>
                                <ion-icon name="copy-outline" class="copy-icon"></ion-icon>
                                <span class="copy-label"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </form>

            <!-- Ícone de Scroll -->
            <div class="scroll-indicator">
                <svg width="48" height="60" viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="4" width="8" height="12" rx="4" stroke="white" stroke-width="1.5" fill="none"/>
                    <ellipse cx="12" cy="8" rx="1.5" ry="2" fill="white"/>
                    <path d="M9 22 L12 19 L15 22" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M9 27 L12 24 L15 27" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>

            <!-- Calculadora de IVA (mesmo painel do Trivalor) -->
            <div class="calculator-container calculator-panel">
                <h2>Calculadora de IVA</h2>
                <div class="calculator-inputs calc-form">
                    <div class="calc-field">
                        <label for="valor">Valor com IVA (€):</label>
                        <input type="number" id="valor" placeholder="Ex: 5.50" step="0.01">
                    </div>

                    <div class="calc-field">
                        <label for="iva">Taxa de IVA (%):</label>
                        <input type="number" id="iva" value="23" step="0.01">
                    </div>

                    <button type="button" class="btn-calc" onclick="calcularIVA()">Calcular</button>

                    <div class="resultado" id="resultado" style="display: none;">
                        <p><strong>Valor sem IVA:</strong> <span id="semIVA"></span> €</p>
                        <p><strong>Valor do IVA:</strong> <span id="valorIVA"></span> €</p>
                        <p><strong>Valor com IVA:</strong> <span id="comIVA"></span> €</p>
                    </div>
                </div>
            </div>
        </div><!-- /.child1 -->
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script src="/JScripts/SidebarMenu.js"></script>
    <script src="/JScripts/BCP.js"></script>
</body>
</html>
